            </div>

            <button type="button" id="contact-reveal-btn" class="btn-primary px-8 py-3 text-lg">Contact us</button>

                <a href="https://t.me/dua_crypto" target="_blank" rel="noopener noreferrer" class="text-primary hover:underline">Telegram</a>

        </div>

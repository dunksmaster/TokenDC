# Cloudflare Pages (not a Worker). Do NOT run `wrangler deploy` or `wrangler versions upload`.
# Build: npm run build  |  Output: dist
# Git "Deploy command" in the dashboard MUST be empty, or: npm run deploy
# Wrong (breaks builds): npx wrangler versions upload
# See docs/CLOUDFLARE-DEPLOY.md
name = "dc-site"
compatibility_date = "2024-09-01"
pages_build_output_dir = "dist"
compatibility_flags = ["nodejs_compat"]

[vars]
X402_FACILITATOR_URL = "https://x402.org/facilitator"
X402_PAY_TO = "0x26507ccEEaB8C073620205Bf4aE1cd50E9f612af"
X402_NETWORK = "eip155:84532"
X402_PRICE = "$0.001"

[observability]
enabled = true

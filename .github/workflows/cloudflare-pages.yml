# MANUAL FALLBACK ONLY. Production now deploys via Cloudflare Pages native Git
# integration (Cloudflare builds duacrypto.com on every push to main).
# This workflow no longer runs on push to avoid double-deploys; keep it for
# manual rollback/redeploy (Actions tab → Run workflow), or delete it once the
# native Git build is confirmed working. Requires CLOUDFLARE_API_TOKEN +
# CLOUDFLARE_ACCOUNT_ID repo secrets. See docs/CLOUDFLARE-DEPLOY.md.
name: Deploy to Cloudflare Pages (manual fallback)

on:
  workflow_dispatch:

concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Require Cloudflare secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::Missing GitHub secrets CLOUDFLARE_API_TOKEN and/or CLOUDFLARE_ACCOUNT_ID."
            echo "Create an API token at https://dash.cloudflare.com/profile/api-tokens (template: Edit Cloudflare Workers)"
            echo "Account ID: Cloudflare Dashboard → Workers & Pages → right sidebar."
            echo "Add both as repo secrets, then re-run this workflow."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: |
          export SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)
          npm ci && npm run build

      - name: Ensure Pages project exists
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.93.0"
          command: pages project create dc-site --production-branch=main
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.93.0"
          command: pages deploy dist --project-name=dc-site --branch=main --commit-dirty=true

      - name: Verify Link headers on Pages preview
        run: npm run verify:headers -- https://dc-site-4p3.pages.dev/

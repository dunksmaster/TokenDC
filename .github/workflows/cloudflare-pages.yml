# Auto-deploy on push to main + manual workflow_dispatch.
# Requires CLOUDFLARE_PAGES_API_TOKEN (Pages Edit) - not the DNS-only token.
# See docs/CLOUDFLARE-DEPLOY.md.
name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Require Cloudflare Pages secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Missing GitHub secrets. Set CLOUDFLARE_PAGES_API_TOKEN (Account → Cloudflare Pages → Edit) and CLOUDFLARE_ACCOUNT_ID."
            echo "CLOUDFLARE_API_TOKEN is DNS-only and cannot deploy Pages. See docs/CLOUDFLARE-DEPLOY.md."
            exit 1
          fi
          code=$(curl -s -o /tmp/cf-pages.json -w "%{http_code}" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/dc-site")
          if [ "$code" = "401" ] || [ "$code" = "403" ]; then
            echo "::error::CLOUDFLARE_PAGES_API_TOKEN is invalid or expired (HTTP $code)."
            echo "Create a new token: Cloudflare dashboard → My Profile → API Tokens → Custom → Account / Cloudflare Pages / Edit"
            echo "Then: gh secret set CLOUDFLARE_PAGES_API_TOKEN --repo dunksmaster/TokenDC"
            cat /tmp/cf-pages.json || true
            exit 1
          fi
          if [ "$code" != "200" ]; then
            echo "::warning::Preflight check returned HTTP $code (continuing to deploy)"
            cat /tmp/cf-pages.json || true
          fi

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: |
          export SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)
          npm ci && npm audit --audit-level=high && npm run build

      - name: Verify build output
        run: npm run verify:build

      - name: Deploy to Cloudflare Pages
        run: |
          set -e
          for i in 1 2 3; do
            echo "Deploy attempt $i..."
            log=$(mktemp)
            if npx --yes wrangler@4.100.0 pages deploy dist --project-name=dc-site --branch=main --commit-dirty=true 2>&1 | tee "$log"; then
              echo "Deploy succeeded on attempt $i"
              exit 0
            fi
            if grep -qE 'Invalid access token|Authentication error|code: 9109|code: 10000' "$log"; then
              echo "::error::Cloudflare token rejected. Regenerate CLOUDFLARE_PAGES_API_TOKEN (see deploy workflow logs)."
              exit 1
            fi
            if [ "$i" -eq 3 ]; then
              echo "::error::Cloudflare Pages deploy failed after 3 attempts (likely rate limit 10429)."
              exit 1
            fi
            wait=$((i * 60))
            echo "Retrying in ${wait}s..."
            sleep "$wait"
          done

      - name: Verify Link headers on Pages preview
        run: npm run verify:headers -- https://dc-site-4p3.pages.dev/
        continue-on-error: true

      - name: Verify auth.md on Pages preview
        run: npm run verify:auth-md -- https://dc-site-4p3.pages.dev
        continue-on-error: true

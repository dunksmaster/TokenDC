# Cloudflare Pages deploy — required for RFC 8288 Link response headers (GitHub Pages cannot set them).
name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install and build
        run: |
          export SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)
          npm ci && npm run build

      - name: Deploy to Cloudflare Pages
        id: cloudflare
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pages deploy (not `wrangler versions upload`). Requires CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID secrets.
          command: npm run deploy:production

      - name: Cloudflare deploy note
        if: steps.cloudflare.outcome == 'failure'
        run: |
          echo "::warning::Cloudflare Pages deploy skipped or failed. Link response headers require Cloudflare Pages (or a Transform Rule on proxied GitHub Pages). See docs/CLOUDFLARE-DEPLOY.md."

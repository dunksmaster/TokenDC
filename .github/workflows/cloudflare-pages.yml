# Production deploy: every push to main → build dist/ → Cloudflare Pages (dc-site).
# Also runnable via workflow_dispatch. Requires CLOUDFLARE_API_TOKEN +
# CLOUDFLARE_ACCOUNT_ID repo secrets. See docs/CLOUDFLARE-DEPLOY.md.
name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Require Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Missing GitHub secrets CLOUDFLARE_API_TOKEN and/or CLOUDFLARE_ACCOUNT_ID."
            exit 1
          fi
          code=$(curl -s -o /tmp/cf-pages.json -w "%{http_code}" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/dc-site")
          if [ "$code" != "200" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN cannot access Pages project dc-site (HTTP $code)."
            echo "Create a token at https://dash.cloudflare.com/profile/api-tokens"
            echo "Required: Account → Cloudflare Pages → Edit (Edit Cloudflare Workers template)."
            echo "DNS-only tokens work for fix-dns but NOT for deploy."
            cat /tmp/cf-pages.json || true
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: |
          export SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)
          npm ci && npm run build

      - name: Ensure Pages project exists
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.93.0"
          command: pages project create dc-site --production-branch=main
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.93.0"
          command: pages deploy dist --project-name=dc-site --branch=main --commit-dirty=true

      - name: Verify Link headers on Pages preview
        run: npm run verify:headers -- https://dc-site-4p3.pages.dev/

      - name: Verify auth.md on Pages preview
        run: npm run verify:auth-md -- https://dc-site-4p3.pages.dev

# Production deploy: Vite build → dist/ → Cloudflare Pages (duacrypto.com).
# Required for RFC 8288 Link response headers, Pages Functions, and x402 API routes.
name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Require Cloudflare secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::Missing GitHub secrets CLOUDFLARE_API_TOKEN and/or CLOUDFLARE_ACCOUNT_ID."
            echo "Create an API token at https://dash.cloudflare.com/profile/api-tokens (template: Edit Cloudflare Workers)"
            echo "Account ID: Cloudflare Dashboard → Workers & Pages → right sidebar."
            echo "Add both as repo secrets, then re-run this workflow."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: |
          export SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)
          npm ci && npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.93.0"
          command: pages deploy dist --project-name=dc-site --branch=main

      - name: Attach custom domain (idempotent)
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.93.0"
          command: pages domain add duacrypto.com --project-name=dc-site

      - name: Verify Link headers on Pages preview
        continue-on-error: true
        run: npm run verify:headers -- https://main.dc-site.pages.dev/

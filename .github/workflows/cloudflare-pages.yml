# Auto-deploy on push to main + manual workflow_dispatch.
# Requires CLOUDFLARE_PAGES_API_TOKEN (Pages Edit) - not the DNS-only token.
# See docs/CLOUDFLARE-DEPLOY.md.
name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Require Cloudflare Pages secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Missing GitHub secrets. Set CLOUDFLARE_PAGES_API_TOKEN (Account ? Cloudflare Pages ? Edit) and CLOUDFLARE_ACCOUNT_ID."
            echo "CLOUDFLARE_API_TOKEN is DNS-only and cannot deploy Pages. See docs/CLOUDFLARE-DEPLOY.md."
            exit 1
          fi
          code=$(curl -s -o /tmp/cf-pages.json -w "%{http_code}" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/dc-site")
          if [ "$code" != "200" ]; then
            echo "::error::Cloudflare token cannot access Pages project dc-site (HTTP $code)."
            echo "Fix: https://dash.cloudflare.com/profile/api-tokens ? Create Token ? Custom"
            echo "Permission: Account ? Cloudflare Pages ? Edit"
            echo "Then run: gh secret set CLOUDFLARE_PAGES_API_TOKEN"
            echo "Keep CLOUDFLARE_API_TOKEN for fix-dns (DNS Edit only)."
            cat /tmp/cf-pages.json || true
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: |
          export SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)
          export CSP_ENFORCE=1
          npm ci && npm audit --audit-level=high && npm run build

      - name: Verify build output
        run: npm run verify:build

      - name: Ensure Pages project exists
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.100.0"
          command: pages project create dc-site --production-branch=main
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.100.0"
          command: pages deploy dist --project-name=dc-site --branch=main --commit-dirty=true

      - name: Verify Link headers on Pages preview
        run: npm run verify:headers -- https://dc-site-4p3.pages.dev/

      - name: Verify auth.md on Pages preview
        run: npm run verify:auth-md -- https://dc-site-4p3.pages.dev

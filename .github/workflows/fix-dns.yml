# Run after nameservers point to Cloudflare (aurora/ernest.ns.cloudflare.com).
# Uses CLOUDFLARE_API_TOKEN repo secret (Zone.DNS Edit on duacrypto.com).
name: Fix Cloudflare DNS

on:
  workflow_dispatch:

jobs:
  fix-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fix DNS records
        run: npm run fix:dns
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Diagnose domain
        run: npm run diagnose:domain

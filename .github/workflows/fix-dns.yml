# Run after nameservers point to Cloudflare (aurora/ernest.ns.cloudflare.com).
# Uses CLOUDFLARE_DNS_API_TOKEN (or CLOUDFLARE_API_TOKEN) — Zone.DNS Edit on duacrypto.com.
name: Fix Cloudflare DNS

on:
  workflow_dispatch:

jobs:
  fix-dns:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DNS_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fix DNS records + DNS-AID + DNSSEC
        run: npm run fix:dns

      - name: Dedupe SPF/DMARC (keep PrivateEmail)
        run: npm run fix:email-dns

      - name: Diagnose domain
        run: npm run diagnose:domain

      - name: Verify DNS-AID
        run: npm run verify:dns-aid
        continue-on-error: true

      - name: Verify auth.md
        run: npm run verify:auth-md
        continue-on-error: true

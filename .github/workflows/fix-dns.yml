# Run after nameservers point to Cloudflare (aurora/ernest.ns.cloudflare.com).
# Uses CLOUDFLARE_API_TOKEN (DNS Edit on duacrypto.com) or CLOUDFLARE_DNS_API_TOKEN.
# Do not use CLOUDFLARE_PAGES_API_TOKEN here — Pages tokens may lack DNS Edit.
name: Fix Cloudflare DNS

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fix-dns:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DNS_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Fix DNS records + DNS-AID + DNSSEC
        run: npm run fix:dns

      - name: Dedupe SPF/DMARC (keep PrivateEmail)
        run: npm run fix:email-dns

      - name: Diagnose domain
        run: npm run diagnose:domain

      - name: Verify DNS-AID
        run: npm run verify:dns-aid
        continue-on-error: true

      - name: Verify auth.md
        run: npm run verify:auth-md
        continue-on-error: true
